{% extends "base.html" %}

{% block title %}Page not found{% endblock %}

{% block content %}
  <main class="container error-page" aria-labelledby="error-title">
    <section class="error-card">
      <p class="error-card__code">404</p>

      <h1 id="error-title" class="error-card__title">
        Page not found
      </h1>

      <p class="error-card__body">
        We could not find that page or record. It may have been deleted,
        moved, or the link may be wrong.
      </p>

      <div class="error-card__actions">
        <a class="button button--primary" href="/">
          Back to dashboard
        </a>
      </div>
    </section>
  </main>
{% endblock %}
