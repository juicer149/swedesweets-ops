{% load i18n %}

<form
  method="{{ method|default:'post' }}"
  class="{{ form_class|default:'form-card' }}"
  novalidate
>
  {% csrf_token %}

  {% if form.non_field_errors %}
    <div class="form-errors" role="alert">
      {% for error in form.non_field_errors %}
        <p>{{ error }}</p>
      {% endfor %}
    </div>
  {% endif %}

  <div class="form-grid">
    {% for field in form %}
      {% include "includes/ui/form_field.html" with field=field only %}
    {% endfor %}
  </div>

  <div class="form-actions">
    <button class="button button--md button--solid button--tone-place" type="submit">
      {% if submit_label %}
        {{ submit_label }}
      {% else %}
        {% trans "Save" %}
      {% endif %}
    </button>

    {% if cancel_url %}
      <a class="button button--md button--ghost button--tone-neutral" href="{{ cancel_url }}">
        {% trans "Cancel" %}
      </a>
    {% endif %}
  </div>
</form>
