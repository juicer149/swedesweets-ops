{% if content_lines %}
  <div class="detail-line-list">
    {% for line in content_lines %}
      <article
        class="detail-line clickable-row"
        data-tone="neutral"
        data-href="{{ line.product_detail_href }}"
        tabindex="0"
        role="link"
        aria-label="View product {{ line.product.display_name }}"
      >
        <strong>
          {{ line.quantity_label }}
          —
          {{ line.product.display_name }}
        </strong>

        <span>
          {{ line.catalog_label }}
          ·
          Unit: {{ line.unit }}
        </span>
      </article>
    {% endfor %}
  </div>

  <p class="table-hint">
    Select a product to view its product detail.
  </p>
{% else %}
  <p class="form-help">No order contents found.</p>
{% endif %}
