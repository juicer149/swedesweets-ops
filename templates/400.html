{% extends "base.html" %}

{% block title %}Bad request{% endblock %}

{% block content %}
  <main class="container error-page" aria-labelledby="error-title">
    <section class="error-card">
      <p class="error-card__code">400</p>

      <h1 id="error-title" class="error-card__title">
        Bad request
      </h1>

      <p class="error-card__body">
        The request could not be understood by the system. Go back and try
        again, or return to the dashboard.
      </p>

      <div class="error-card__actions">
        <a class="button button--primary" href="/">
          Back to dashboard
        </a>
      </div>
    </section>
  </main>
{% endblock %}
